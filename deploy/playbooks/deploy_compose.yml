---
- name: Deploy compose stack
  hosts: all
  become: true

  vars:
    app_dir: /opt/edumap
    docker_image_name: "{{ lookup('env', 'DOCKER_IMAGE_NAME') }}"

  tasks:
    - name: Ensure app dir exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure nginx, html and npm dirs exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}/nginx"
        - "{{ app_dir }}/html"
        - "{{ app_dir }}/npm/data"
        - "{{ app_dir }}/npm/letsencrypt"

    - name: Upload docker-compose.yml
      copy:
        src: ../../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Upload nginx config
      copy:
        src: ../../nginx/nginx.conf
        dest: "{{ app_dir }}/nginx/nginx.conf"
        mode: "0644"

    - name: Upload html index
      copy:
        src: ../../html/index.html
        dest: "{{ app_dir }}/html/index.html"
        mode: "0644"

    - name: Render .env
      template:
        src: ../templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    - name: Add DOCKER_IMAGE_NAME to .env
      lineinfile:
        path: "{{ app_dir }}/.env"
        line: "DOCKER_IMAGE_NAME={{ docker_image_name }}"

    - name: Docker Hub login on VM
      community.docker.docker_login:
        registry_url: https://index.docker.io/v1/
        username: "{{ lookup('env', 'DOCKER_USER') }}"
        password: "{{ lookup('env', 'DOCKER_TOKEN') }}"

    - name: Stop and remove all existing services and orphans
      shell: |
        export DOCKER_IMAGE_NAME={{ docker_image_name }}
        docker compose -f docker-compose.yml down --remove-orphans
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Pull images
      shell: |
        export DOCKER_IMAGE_NAME={{ docker_image_name }}
        docker compose -f docker-compose.yml pull
      args:
        chdir: "{{ app_dir }}"

    - name: Start services
      shell: |
        export DOCKER_IMAGE_NAME={{ docker_image_name }}
        docker compose -f docker-compose.yml up -d
      args:
        chdir: "{{ app_dir }}"

    - name: Check running containers
      shell: docker compose -f docker-compose.yml ps
      args:
        chdir: "{{ app_dir }}"
      register: ps_output

    - name: Show running containers
      debug:
        var: ps_output.stdout_lines

    - name: Wait for API health endpoint (via docker exec)
      shell: docker exec edumap-api curl -f http://localhost:8000/health
      args:
        chdir: "{{ app_dir }}"
      register: healthcheck
      retries: 30
      delay: 5
      until: healthcheck.rc == 0

    - name: Show health check result
      debug:
        var: healthcheck.stdout_lines