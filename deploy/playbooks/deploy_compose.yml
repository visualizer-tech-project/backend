---
- name: Deploy compose stack
  hosts: all
  become: true

  vars:
    app_dir: /opt/edumap
    npm_db_password: "{{ lookup('env', 'NPM_DB_PASSWORD') }}"
    compose_path: "{{ app_dir }}/docker-compose.yml"

  tasks:
    - name: Ensure app dir exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure nginx, html and npm dirs exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}/nginx"
        - "{{ app_dir }}/html"
        - "{{ app_dir }}/npm/data"
        - "{{ app_dir }}/npm/letsencrypt"

    - name: Copy nginx config
      copy:
        src: "../../nginx/nginx.conf"
        dest: "{{ app_dir }}/nginx/nginx.conf"
        mode: "0644"

    - name: Copy html index
      copy:
        src: "../../html/index.html"
        dest: "{{ app_dir }}/html/index.html"
        mode: "0644"

    - name: Check if compose file exists
      stat:
        path: "{{ compose_path }}"
      register: compose_file

    - name: Set default values
      set_fact:
        web_service_config: {}
        front_image: "nginx:stable-alpine"

    - name: Extract web service config and front image from existing compose
      block:
        - name: Read existing compose file
          slurp:
            src: "{{ compose_path }}"
          register: existing_compose_data

        - name: Parse existing compose
          set_fact:
            existing_compose: "{{ existing_compose_data.content | b64decode | from_yaml }}"

        - name: Extract full web service config
          set_fact:
            web_service_config: "{{ existing_compose.services.web | default({}) }}"

        - name: Extract front image
          set_fact:
            front_image: "{{ existing_compose['x-front-image'] | default('nginx:stable-alpine') }}"
      when: compose_file.stat.exists

    - name: Set back_image variable
      set_fact:
        back_image: "{{ lookup('env', 'DOCKER_IMAGE_NAME') }}:{{ lookup('env', 'IMAGE_TAG', default='latest') }}"

    - name: Render docker-compose.yml from template
      template:
        src: ../templates/docker-compose.j2
        dest: "{{ compose_path }}"
        mode: "0644"
      vars:
        back_image: "{{ back_image }}"
        front_image: "{{ front_image }}"
        web_service_config: "{{ web_service_config }}"

    - name: Render .env
      template:
        src: ../templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    - name: Docker Hub login on VM
      community.docker.docker_login:
        username: "{{ lookup('env', 'DOCKER_USER') }}"
        password: "{{ lookup('env', 'DOCKER_TOKEN') }}"

    - name: Pull only API image
      shell: |
        cd {{ app_dir }}
        docker pull {{ back_image }}

    - name: Restart only API container
      shell: |
        cd {{ app_dir }}
        docker compose up -d --no-deps --force-recreate api
      environment:
        NPM_DB_PASSWORD: "{{ npm_db_password }}"