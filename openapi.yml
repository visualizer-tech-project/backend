        '400':
          description: Некорректные данные или запись уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                detail: "Progress record already exists"
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                detail: "Not authenticated"
        '403':
          description: Нет прав для отметки прогресса этому пользователю
