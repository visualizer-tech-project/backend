openapi: 3.0.0
info:
  title: EduMap API
  description: API для интерактивной карты учебных курсов
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local development server

tags:
  - name: auth
    description: Аутентификация и регистрация
  - name: users
    description: Управление пользователями
  - name: programs
    description: Образовательные программы
  - name: courses
    description: Курсы и дисциплины
  - name: career-tracks
    description: Карьерные треки
  - name: progress
    description: Прогресс студента
  - name: roles
    description: Управление ролями
  - name: permissions
    description: Управление разрешениями

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        detail:
          type: string
          description: Описание ошибки
      required:
        - detail

    PaginationInfo:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pages_num:
          type: integer
          example: 8
        total:
          type: integer
          example: 150
      required:
        - page
        - pages_num
        - total

    UserRole:
      type: string
      enum: [student, teacher, admin]

    AccountStatus:
      type: string
      enum: [created, confirmed, blocked]

    UserPublic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: "student@example.com"
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Петров"
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/AccountStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - email
        - first_name
        - last_name
        - role
        - status
        - created_at
        - updated_at

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "student@example.com"
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
          example: "securepass123"
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Иван"
        last_name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Петров"
      required:
        - email
        - password
        - first_name
        - last_name

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "student@example.com"
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
          example: "securepass123"
      required:
        - email
        - password

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          example: "bearer"
      required:
        - access_token
        - refresh_token
        - token_type

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: "bearer"
      required:
        - access_token
        - refresh_token
        - token_type

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    MeResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/AccountStatus'
      required:
        - id
        - email
        - first_name
        - last_name
        - role
        - status

    VerifyAccountRequest:
      type: object
      properties:
        code:
          type: string
          format: uuid
      required:
        - code

    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
        confirm_password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
      required:
        - new_password
        - confirm_password

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    ResetPasswordRequest:
      type: object
      properties:
        code:
          type: string
          format: uuid
        new_password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
        confirm_password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
      required:
        - code
        - new_password
        - confirm_password

    MessageResponse:
      type: object
      properties:
        message:
          type: string
        success:
          type: boolean
      required:
        - message
        - success

    UserUpdate:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Петр"
        last_name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Сидоров"
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/AccountStatus'

    EscalateRoleRequest:
      type: object
      properties:
        role_name:
          type: string
          example: "teacher"
      required:
        - role_name

    Program:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Программная инженерия"
        description:
          type: string
          example: "Подготовка инженеров-программистов"
        user_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserPublic'
      required:
        - id
        - title
        - user_id
        - created_at
        - updated_at
        - user

    ProgramCreate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "Программная инженерия"
        description:
          type: string
          example: "Подготовка инженеров-программистов"
      required:
        - title

    ProgramUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "Программная инженерия (обновленная)"
        description:
          type: string
        user_id:
          type: integer

    ProgramCopyRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "Программная инженерия 2027"
      required:
        - title

    PaginatedPrograms:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Program'
        info:
          $ref: '#/components/schemas/PaginationInfo'
      required:
        - items
        - info

    CourseType:
      type: string
      enum: [required, elective]

    Course:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Алгоритмы и структуры данных"
          description: "Название курса (уникально в рамках программы)"
        description:
          type: string
          example: "Базовый курс по алгоритмам"
        type:
          $ref: '#/components/schemas/CourseType'
        program_id:
          type: integer
          example: 1
          description: "ID программы, к которой относится курс"
        user_id:
          type: integer
          example: 1
          description: "ID пользователя, создавшего курс"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - program_id
        - user_id
        - created_at
        - updated_at

    CourseCreate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "Алгоритмы и структуры данных"
          description: "Название курса (должно быть уникальным в рамках программы)"
        description:
          type: string
          example: "Базовый курс по алгоритмам"
        type:
          $ref: '#/components/schemas/CourseType'
        program_id:
          type: integer
          example: 1
          description: "ID существующей программы"
      required:
        - title
        - type
        - program_id

    CourseUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          example: "Продвинутые алгоритмы"
          description: "Новое название курса"
        description:
          type: string
        type:
          $ref: '#/components/schemas/CourseType'
        program_id:
          type: integer
          description: "ID программы (для перемещения курса)"
        user_id:
          type: integer
          description: "ID нового владельца курса"

    PrerequisiteCreate:
      type: object
      properties:
        prerequisite_course_id:
          type: integer
          example: 1
      required:
        - prerequisite_course_id

    Prerequisite:
      type: object
      properties:
        id:
          type: integer
        course_id:
          type: integer
        prerequisite_course_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - course_id
        - prerequisite_course_id
        - created_at
        - updated_at

    PaginatedCourses:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Course'
        info:
          $ref: '#/components/schemas/PaginationInfo'
      required:
        - items
        - info

    CareerTrack:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Backend-разработчик"
        description:
          type: string
          example: "Траектория для будущих backend-разработчиков"
        user_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserPublic'
        courses_count:
          type: integer
          example: 5
      required:
        - id
        - title
        - user_id
        - created_at
        - updated_at
        - user
        - courses_count

    CareerTrackCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          example: "Backend-разработчик"
        description:
          type: string
          example: "Траектория для будущих backend-разработчиков"
      required:
        - title

    CareerTrackUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          example: "Go-разработчик"
        description:
          type: string
        user_id:
          type: integer

    AddCourseToTrack:
      type: object
      properties:
        course_id:
          type: integer
          example: 3
        order_index:
          type: integer
          minimum: 0
          example: 1
      required:
        - course_id
        - order_index

    CareerTrackCourse:
      type: object
      properties:
        id:
          type: integer
        career_track_id:
          type: integer
        course_id:
          type: integer
        order_index:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - career_track_id
        - course_id
        - order_index
        - created_at
        - updated_at

    TrackCourseItem:
      type: object
      properties:
        order_index:
          type: integer
          example: 1
        course:
          $ref: '#/components/schemas/Course'
      required:
        - order_index
        - course

    PaginatedCareerTracks:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CareerTrack'
        info:
          $ref: '#/components/schemas/PaginationInfo'
      required:
        - items
        - info

    ProgressStatus:
      type: string
      enum: [not_started, in_progress, completed]

    UserProgress:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 5
        course_id:
          type: integer
          example: 3
        status:
          $ref: '#/components/schemas/ProgressStatus'
        grade:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          example: 85
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - course_id
        - status
        - created_at
        - updated_at

    UserProgressWithDetails:
      type: object
      properties:
        progress:
          $ref: '#/components/schemas/UserProgress'
        course_title:
          type: string
          nullable: true
        course_type:
          type: string
          nullable: true
        program_id:
          type: integer
          nullable: true
        user_name:
          type: string
        user_email:
          type: string
      required:
        - progress
        - user_name
        - user_email

    ProgressCreate:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        grade:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
      required:
        - status

    ProgressUpdate:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        grade:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    PaginatedProgress:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProgressWithDetails'
        info:
          $ref: '#/components/schemas/PaginationInfo'
      required:
        - items
        - info

    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "teacher"
        description:
          type: string
          nullable: true
          example: "Role: teacher"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
          example: ["profile:read", "programs:list"]
      required:
        - id
        - name
        - created_at
        - updated_at
        - scopes

    RoleCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          example: "mentor"
        description:
          type: string
          maxLength: 255
          example: "Роль ментора"
        scope_aliases:
          type: array
          items:
            type: string
          example: ["profile:read", "courses:list"]
      required:
        - name

    RoleUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 255
        scope_aliases:
          type: array
          items:
            type: string

    Permission:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
          example: "courses"
        action:
          type: string
          example: "read"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        alias:
          type: string
          example: "courses:read"
      required:
        - id
        - subject
        - action
        - created_at
        - updated_at
        - alias

  parameters:
    SkipParam:
      in: query
      name: skip
      schema:
        type: integer
        minimum: 0
        default: 0
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email уже зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify:
    post:
      tags: [auth]
      summary: Подтверждение аккаунта
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyAccountRequest'
      responses:
        '200':
          description: Аккаунт подтвержден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Код недействителен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Код не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "refresh_token=...; HttpOnly; Secure; SameSite=Lax"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Обновление токена
      parameters:
        - in: cookie
          name: refresh_token
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Токен обновлен
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Невалидный refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [auth]
      summary: Выход из системы
      parameters:
        - in: cookie
          name: refresh_token
          schema:
            type: string
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [auth]
      summary: Получить информацию о текущем пользователе
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Запрос на восстановление пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Инструкция отправлена на email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/reset-password:
    post:
      tags: [auth]
      summary: Сброс пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Пароль успешно изменен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Код не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/change-password:
    post:
      tags: [auth]
      summary: Изменение пароля
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
