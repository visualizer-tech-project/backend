<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #4CAF50; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background-color: #f9f9f9; }
        .code { font-size: 24px; font-weight: bold; color: #4CAF50; padding: 10px;
                background-color: #e8f5e9; text-align: center; margin: 20px 0; }
        .button { display: inline-block; padding: 10px 20px; background-color: #4CAF50;
                 color: white; text-decoration: none; border-radius: 5px; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title }}</h1>
        </div>
        <div class="content">
            <h2>Подтверждение аккаунта</h2>
            <p>Спасибо за регистрацию! Для подтверждения аккаунта используйте код:</p>

            <div class="code">{{ verification_code }}</div>

            <p>Или перейдите по ссылке:</p>
            <p>
                <a href="{{ verification_link }}" class="button">Подтвердить аккаунт</a>
            </p>

            <p>Ссылка действительна в течение 1 часа.</p>
        </div>
        <div class="footer">
            <p>Если вы не регистрировались, просто проигнорируйте это письмо.</p>
        </div>
    </div>
</body>
</html>
