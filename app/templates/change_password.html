<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2196F3; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background-color: #f9f9f9; }
        .code { font-size: 24px; font-weight: bold; color: #2196F3; padding: 10px;
                background-color: #e3f2fd; text-align: center; margin: 20px 0; }
        .button { display: inline-block; padding: 10px 20px; background-color: #2196F3;
                 color: white; text-decoration: none; border-radius: 5px; }
        .warning { color: #f44336; font-weight: bold; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title }}</h1>
        </div>
        <div class="content">
            <h2>Сброс пароля</h2>
            <p>Вы запросили сброс пароля. Используйте код:</p>

            <div class="code">{{ reset_code }}</div>

            <p>Или перейдите по ссылке:</p>
            <p>
                <a href="{{ reset_link }}" class="button">Сменить пароль</a>
            </p>

            <p class="warning">Ссылка действительна в течение 1 часа.</p>
        </div>
        <div class="footer">
            <p>Если вы не запрашивали сброс пароля, просто проигнорируйте это письмо.</p>
        </div>
    </div>
</body>
</html>
